<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>ResourceMonitor - Gráfico</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #ffffff; font-family: "Segoe UI", sans-serif; }
  #chart { display: block; }
</style>
</head>
<body>
<canvas id="chart"></canvas>
<script>
let lastData = null;
let lastTrendData = null;

function resizeCanvas() {
  const canvas = document.getElementById('chart');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  if (lastTrendData) drawTrend(lastTrendData);
  else if (lastData) draw(lastData);
}

window.addEventListener('resize', resizeCanvas);

function renderSamples(data) {
  lastData = data;
  resizeCanvas();
}

// Usado pela aba Gráficos (mesmo chart.html, instância própria de WebView2) pra mostrar
// médias diárias — eixo X por dia em vez de horário, e uma 4ª linha de espaço livre em disco.
function renderDailyTrend(data) {
  lastTrendData = data;
  resizeCanvas();
}

function draw(data) {
  const canvas = document.getElementById('chart');
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  if (!data || data.length === 0) {
    ctx.fillStyle = '#666';
    ctx.font = '14px Segoe UI';
    ctx.fillText('Sem dados pra exibir.', 20, 30);
    return;
  }

  const paddingLeft = 50, paddingRight = 20, paddingTop = 24, paddingBottom = 40;
  const plotW = w - paddingLeft - paddingRight;
  const plotH = h - paddingTop - paddingBottom;
  const n = data.length;

  ctx.strokeStyle = '#ddd';
  ctx.fillStyle = '#666';
  ctx.font = '11px Segoe UI';
  ctx.lineWidth = 1;
  for (let pct = 0; pct <= 100; pct += 20) {
    const y = paddingTop + plotH - (pct / 100) * plotH;
    ctx.beginPath();
    ctx.moveTo(paddingLeft, y);
    ctx.lineTo(paddingLeft + plotW, y);
    ctx.stroke();
    ctx.fillText(pct + '%', 10, y + 4);
  }

  const step = Math.max(1, Math.floor(n / 8));
  for (let i = 0; i < n; i += step) {
    const x = paddingLeft + (i / (n - 1 || 1)) * plotW;
    ctx.fillText(data[i].timestamp, x - 15, h - 15);
  }

  function plotLine(key, color) {
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    data.forEach((point, i) => {
      const x = paddingLeft + (i / (n - 1 || 1)) * plotW;
      const y = paddingTop + plotH - (point[key] / 100) * plotH;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    });
    ctx.stroke();
  }

  plotLine('cpu', '#2563eb');
  plotLine('ram', '#f97316');
  plotLine('io', '#16a34a');

  ctx.fillStyle = '#2563eb';
  ctx.fillRect(paddingLeft, 4, 10, 10);
  ctx.fillStyle = '#333';
  ctx.fillText('CPU', paddingLeft + 14, 13);

  ctx.fillStyle = '#f97316';
  ctx.fillRect(paddingLeft + 60, 4, 10, 10);
  ctx.fillStyle = '#333';
  ctx.fillText('RAM', paddingLeft + 74, 13);

  ctx.fillStyle = '#16a34a';
  ctx.fillRect(paddingLeft + 120, 4, 10, 10);
  ctx.fillStyle = '#333';
  ctx.fillText('Disco I/O', paddingLeft + 134, 13);
}

function drawTrend(data) {
  const canvas = document.getElementById('chart');
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  if (!data || data.length === 0) {
    ctx.fillStyle = '#666';
    ctx.font = '14px Segoe UI';
    ctx.fillText('Sem dados de tendência ainda (aguarde algumas capturas de ~5 em 5min).', 20, 30);
    return;
  }

  const paddingLeft = 50, paddingRight = 20, paddingTop = 24, paddingBottom = 40;
  const plotW = w - paddingLeft - paddingRight;
  const plotH = h - paddingTop - paddingBottom;
  const n = data.length;

  ctx.strokeStyle = '#ddd';
  ctx.fillStyle = '#666';
  ctx.font = '11px Segoe UI';
  ctx.lineWidth = 1;
  for (let pct = 0; pct <= 100; pct += 20) {
    const y = paddingTop + plotH - (pct / 100) * plotH;
    ctx.beginPath();
    ctx.moveTo(paddingLeft, y);
    ctx.lineTo(paddingLeft + plotW, y);
    ctx.stroke();
    ctx.fillText(pct + '%', 10, y + 4);
  }

  const step = Math.max(1, Math.floor(n / 10));
  for (let i = 0; i < n; i += step) {
    const x = paddingLeft + (i / (n - 1 || 1)) * plotW;
    ctx.fillText(data[i].date, x - 15, h - 15);
  }

  function plotLine(key, color) {
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    data.forEach((point, i) => {
      const x = paddingLeft + (i / (n - 1 || 1)) * plotW;
      const y = paddingTop + plotH - (point[key] / 100) * plotH;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    });
    ctx.stroke();
  }

  plotLine('cpu', '#2563eb');
  plotLine('ram', '#f97316');
  plotLine('io', '#16a34a');
  plotLine('diskUsage', '#9333ea');

  ctx.fillStyle = '#2563eb';
  ctx.fillRect(paddingLeft, 4, 10, 10);
  ctx.fillStyle = '#333';
  ctx.fillText('CPU', paddingLeft + 14, 13);

  ctx.fillStyle = '#f97316';
  ctx.fillRect(paddingLeft + 60, 4, 10, 10);
  ctx.fillStyle = '#333';
  ctx.fillText('RAM', paddingLeft + 74, 13);

  ctx.fillStyle = '#16a34a';
  ctx.fillRect(paddingLeft + 120, 4, 10, 10);
  ctx.fillStyle = '#333';
  ctx.fillText('Disco I/O', paddingLeft + 134, 13);

  ctx.fillStyle = '#9333ea';
  ctx.fillRect(paddingLeft + 210, 4, 10, 10);
  ctx.fillStyle = '#333';
  ctx.fillText('Disco (uso)', paddingLeft + 224, 13);
}

resizeCanvas();
</script>
</body>
</html>
